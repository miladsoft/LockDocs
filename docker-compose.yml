version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaultix
      POSTGRES_USER: vaultix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vaultix']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── MinIO (S3-compatible storage) ──────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vaultix_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    volumes:
      - minio_data:/data
    ports:
      - '9001:9001'  # Console only — not exposed to internet
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - internal

  # ─── Next.js App ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vaultix:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vaultix
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-vaultix_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal
      - external

  # ─── PDF Processing Worker ───────────────────────────────────
  worker-pdf:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_TYPE: pdf-processor
      DATABASE_URL: postgresql://vaultix:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vaultix
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-vaultix_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Cleanup Worker ──────────────────────────────────────────
  worker-cleanup:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_TYPE: cleanup
      DATABASE_URL: postgresql://vaultix:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vaultix
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-vaultix_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - external
      - internal

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_cache:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
